<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | NOBLE'S PROFESSIONAL PORTFOLIO</title>
    <link rel="stylesheet" href="portfolio.css">
</head>
<body>
    <header>
        <nav>
            <ul>
                <li><a href="home.html">Home</a></li>
                <li><a href="about.html">About</a></li>
                <li><a href="contact.html" class="active">Contact</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section>
            <h1>Contact Me</h1>
            <p>Feel free to reach out for collaborations or questions!</p>
           
            <form action="#" method="post">
                <table border="0">
                    <tr>
                        <td><label for="name">Name:</label></td>
                        <td><input type="text" id="name" name="full_name" placeholder="Enter your name" required></td>
                    </tr>
                    <tr>
                        <td><label for="email">Email:</label></td>
                        <td><input type="email" id="email" name="user_email" placeholder="Enter your email" required></td>
                    </tr>
                    <tr>
                        <td><label for="message">Message:</label></td>
                        <td><textarea id="message" rows="5" cols="30" placeholder="How can I help you?"></textarea></td>
                    </tr>
                    <tr>
                        <td></td>
                        <td><button type="submit">Send Message</button></td>
                    </tr>
                </table>
            </form>
        </section>
    </main>

</body>
</html>
